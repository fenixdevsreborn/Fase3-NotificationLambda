# ------------------------------------------------------------------------------
# Publicar imagem Docker no ECR e disparar Fase3-InfraOrchestrador.
# Use quando este projeto for a raiz do repositório. Serviço: notification-lambda.
# ------------------------------------------------------------------------------

name: Publish image

on:
  push:
    branches: [master]

env:
  SERVICE_NAME: notification-lambda
  DOTNET_VERSION: "10.0.x"
  # Mata o warning do Node 20 e força o uso do Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.meta.outputs.tags }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_ECR }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta (tags)
        id: meta
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          REPO="${{ vars.ECR_REPOSITORY_NAME || 'fcg/fase03' }}"
          
          # Definimos as tags que serão usadas
          TAG_LATEST="${REGISTRY}/${REPO}:notification-lambda-latest"
          TAG_SHA="${REGISTRY}/${REPO}:notification-lambda-${{ github.sha }}"
          
          echo "tags=${TAG_LATEST},${TAG_SHA}" >> $GITHUB_OUTPUT
          echo "image_tag=notification-lambda-latest" >> $GITHUB_OUTPUT
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT
          echo "repo=${REPO}" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          # Buildando com múltiplas tags simultâneas
          docker build -f Dockerfile \
            -t ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME || 'fcg/fase03' }}:notification-lambda-latest \
            -t ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME || 'fcg/fase03' }}:notification-lambda-${{ github.sha }} .

      - name: Push image
        run: |
          # Sobe todas as tags configuradas de uma vez
          docker push ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME || 'fcg/fase03' }} --all-tags

      - name: Update Lambda Function
        run: |
          # O comando mestre que sincroniza o ECR com a sua Lambda
          aws lambda update-function-code \
            --function-name fenix-notification-lambda \
            --image-uri ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME || 'fcg/fase03' }}:notification-lambda-latest

  trigger-orchestrator:
    name: Trigger infra orchestrator
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Fase3-InfraOrchestrador
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORCHESTRATOR_REPO_TOKEN }}
          repository: ${{ vars.ORCHESTRATOR_REPO }}
          event-type: deploy-request
          client-payload: |
            {
              "service_name": "${{ env.SERVICE_NAME }}",
              "image_tag": "${{ needs.build-and-push.outputs.image_tag }}",
              "commit_sha": "${{ github.sha }}",
              "environment": "${{ vars.ENVIRONMENT }}"
            }